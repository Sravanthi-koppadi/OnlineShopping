<div class="auth-container">
  <div class="glass-vault-card fade-in">
    
    <div class="vault-glow"></div>

    <div class="vault-header">
      <div class="vault-icon-box">
        <span class="vault-emoji">🔐</span>
      </div>
      <h2 class="vault-title">
        {{ isLoginMode() ? 'Welcome Back login' : 'Sign in' }}
      </h2>
      <p class="vault-subtitle">
        {{ isLoginMode() ? 'Enter your credentials to access your collection' : 'Create a secure account to start shopping' }}
      </p>
    </div>

    <form (submit)="onSubmit(); $event.preventDefault()" class="auth-form">
      
      <div class="input-group">
        <label class="input-label">Username</label>
        <div class="input-wrapper">
          <span class="input-icon">👤</span>
          <input 
            type="text" 
            [(ngModel)]="username" 
            name="username"
            placeholder="Enter username "
            class="auth-input"
            required
          >
        </div>
      </div>

      <div class="input-group">
        <label class="input-label">Password</label>
        <div class="input-wrapper">
          <span class="input-icon">🔑</span>
          <input 
            type="password" 
            [(ngModel)]="password" 
            name="password"
            placeholder="Enter password"
            class="auth-input"
            required
          >
        </div>
      </div>

      <div class="action-wrapper">
        <button type="submit" class="btn-vault-primary">
          <span>{{ isLoginMode() ? 'Login' : 'Sign in' }}</span>
          <span class="arrow-icon">→</span>
        </button>
      </div>
    </form>

    <div class="vault-footer">
      <p class="footer-text">
        {{ isLoginMode() ? "New to ShopVault?" : "Already a member?" }}
        <button (click)="toggleMode()" class="toggle-btn">
          {{ isLoginMode() ? 'Request Access' : 'Sign In' }}
        </button>
      </p>
    </div>

  </div>
</div>
